version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
environmentVariables:
  - name: NODE_OPTIONS
    value: '--max-old-space-size=4096'
  - name: NEXT_TURBOPACK
    value: '0'
  - name: TURBOPACK
    value: '0'
